<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lernplan Sommer 2026</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0f11;
    --surface: #18181c;
    --surface2: #222228;
    --border: #2e2e38;
    --text: #f0f0f2;
    --muted: #8888a0;
    --faint: #444458;
    --thermo2: #E8A838;
    --quantum: #9370DB;
    --sml: #3DAA6A;
    --werkstoffe: #C4845A;
    --fluid_fund: #3A86D4;
    --thermo3: #E05353;
    --control: #D4609A;
    --fluid_adv: #888899;
    --radius: 12px;
    --radius-sm: 8px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 15px; line-height: 1.6; min-height: 100vh; }
  
  .container { max-width: 900px; margin: 0 auto; padding: 2rem 1.5rem 4rem; }
  
  h1 { font-size: 13px; font-weight: 500; color: var(--muted); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 2rem; }

  .section-label { font-size: 11px; font-weight: 500; color: var(--faint); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 10px; }

  /* TODAY */
  .today-card { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 1.25rem 1.5rem; margin-bottom: 1.5rem; }
  .today-date { font-size: 20px; font-weight: 500; color: var(--text); margin-bottom: 1rem; }
  .today-free { font-size: 14px; color: var(--muted); padding: 4px 0; }
  .block-item { display: flex; align-items: center; gap: 12px; padding: 10px 0; border-bottom: 0.5px solid var(--border); cursor: pointer; user-select: none; }
  .block-item:last-child { border-bottom: none; }
  .block-check { width: 20px; height: 20px; border-radius: 50%; border: 1.5px solid var(--faint); display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.15s; }
  .block-check.done { border-color: transparent; }
  .block-check svg { display: none; }
  .block-check.done svg { display: block; }
  .block-time { font-size: 12px; color: var(--muted); font-family: 'DM Mono', monospace; flex-shrink: 0; width: 110px; }
  .block-name { font-size: 15px; font-weight: 500; }
  .block-name.done { color: var(--muted); text-decoration: line-through; }
  .block-tag { margin-left: auto; font-size: 11px; font-weight: 500; padding: 3px 10px; border-radius: 20px; flex-shrink: 0; }

  /* CALENDAR */
  .cal-card { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 1rem 1.25rem; margin-bottom: 1.5rem; }
  .cal-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
  .cal-nav button { background: var(--surface2); border: 0.5px solid var(--border); color: var(--text); border-radius: var(--radius-sm); padding: 4px 12px; cursor: pointer; font-size: 13px; font-family: 'DM Sans', sans-serif; }
  .cal-nav button:hover { background: var(--border); }
  .cal-month { font-size: 15px; font-weight: 500; }
  .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 3px; }
  .cal-dow { text-align: center; font-size: 11px; color: var(--faint); padding: 4px 0; font-weight: 500; }
  .cal-day { background: var(--surface2); border-radius: 8px; min-height: 58px; padding: 4px; display: flex; flex-direction: column; gap: 2px; border: 0.5px solid transparent; }
  .cal-day.today { border-color: #5588ff; }
  .cal-day.weekend { opacity: 0.4; }
  .cal-day.off-day { opacity: 0.3; }
  .cal-day.pruefung { background: #2a1515; border-color: #E05353; }
  .cal-day.empty { background: transparent; border: none; }
  .cal-num { font-size: 10px; color: var(--muted); font-family: 'DM Mono', monospace; padding: 1px 2px; }
  .cal-day.today .cal-num { color: #5588ff; font-weight: 600; }
  .cal-block { font-size: 9.5px; font-weight: 500; padding: 2px 5px; border-radius: 4px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .cal-pruef-label { font-size: 9px; font-weight: 600; padding: 2px 4px; border-radius: 4px; background: #E0535320; color: #E05353; }

  /* LEGEND */
  .legend { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 1.5rem; }
  .legend-item { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--muted); }
  .legend-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

  /* TODOS */
  .todos-card { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius); overflow: hidden; margin-bottom: 1.5rem; }
  .fach-section { border-bottom: 0.5px solid var(--border); }
  .fach-section:last-child { border-bottom: none; }
  .fach-header { display: flex; align-items: center; gap: 10px; padding: 12px 1.25rem; cursor: pointer; user-select: none; }
  .fach-header:hover { background: var(--surface2); }
  .fach-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .fach-title { font-size: 14px; font-weight: 500; }
  .fach-pruef-date { font-size: 11px; color: var(--muted); font-family: 'DM Mono', monospace; }
  .fach-progress { margin-left: auto; font-size: 12px; color: var(--muted); }
  .fach-chevron { color: var(--faint); font-size: 12px; transition: transform 0.2s; flex-shrink: 0; }
  .fach-chevron.open { transform: rotate(180deg); }
  .fach-body { display: none; padding: 0 1.25rem 12px; }
  .fach-body.open { display: block; }
  .sub-label { font-size: 11px; color: var(--faint); font-weight: 500; letter-spacing: 0.06em; text-transform: uppercase; padding: 10px 0 6px; }
  .todo-row { display: flex; align-items: center; gap: 10px; padding: 6px 0; border-bottom: 0.5px solid var(--border); cursor: pointer; user-select: none; }
  .todo-row:last-child { border-bottom: none; }
  .todo-row:hover { opacity: 0.8; }
  .t-check { width: 16px; height: 16px; border-radius: 4px; border: 1px solid var(--faint); flex-shrink: 0; display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
  .t-check.done { border-color: transparent; }
  .t-check svg { display: none; }
  .t-check.done svg { display: block; }
  .t-label { font-size: 13px; }
  .t-label.done { color: var(--muted); text-decoration: line-through; }
  .t-badge { margin-left: auto; font-size: 10px; font-weight: 500; padding: 2px 8px; border-radius: 10px; flex-shrink: 0; }

  .progress-bar-wrap { height: 3px; background: var(--border); border-radius: 2px; margin: 6px 0 2px; }
  .progress-bar { height: 3px; border-radius: 2px; transition: width 0.3s; }
</style>
</head>
<body>
<div class="container">
  <h1>ETH BSc MaschIng · Lernplan Sommer 2026</h1>

  <p class="section-label">Heute</p>
  <div class="today-card" id="today-card"></div>

  <p class="section-label">Kalender</p>
  <div class="cal-card">
    <div class="cal-nav">
      <button id="prev-btn">&#8592;</button>
      <span class="cal-month" id="cal-title"></span>
      <button id="next-btn">&#8594;</button>
    </div>
    <div class="cal-grid" id="cal-dow-row"></div>
    <div id="cal-body"></div>
  </div>

  <div class="legend" id="legend"></div>

  <p class="section-label">Todos nach Fälligkeit</p>
  <div class="todos-card" id="todos-card"></div>
</div>

<script>
const FAECHER = [
  { id:'thermo2', name:'Thermodynamics II', short:'Thermo II', date:'2026-08-03', time:'12:00–14:00', color:'#E8A838',
    serien:['Serie 1 — CAPS','Serie 2 — CAPS','Serie 3 — CAPS','Serie 4 — CAPS','Serie 5 — CAPS','Serie 1 — PRE','Serie 2 — PRE','Serie 3 — PRE','Serie 4 — PRE','Serie 5 — PRE'],
    pruefungen:['Prüfung 1 — HS25','Prüfung 2 — FS25','Prüfung 3 — HS24','Prüfung 4 — FS24'] },
  { id:'quantum', name:'Quantum Mechanics', short:'Quantum', date:'2026-08-05', time:'08:30–10:30', color:'#9370DB',
    serien:['Serie 1','Serie 2','Serie 3','Serie 4','Serie 5','Serie 6','Serie 7','Serie 8','Serie 9','Serie 10','Serie 11','Serie 12'],
    pruefungen:['Prüfung 1','Prüfung 2','Prüfung 3','Prüfung 4','Prüfung 5','Prüfung 6'] },
  { id:'sml', name:'Stochastics & ML', short:'SML', date:'2026-08-07', time:'09:30–11:30', color:'#3DAA6A',
    serien:['Serie 1','Serie 2','Serie 3','Serie 4','Serie 5','Serie 6','Serie 7','Serie 8','Serie 9','Serie 10','Serie 11','Serie 12','Serie 13','Serie 14 — Coding'],
    pruefungen:['Prüfung 1','Prüfung 2','Prüfung 3'] },
  { id:'werkstoffe', name:'Werkstoffe & Fertigung', short:'Werkstoffe', date:'2026-08-10', time:'09:30–11:15', color:'#C4845A',
    serien:['Serie 1','Serie 2','Serie 3','Serie 4','Serie 5','Serie 6','Serie 7','Serie 8','Serie 9','Serie 10','Serie 11','Serie 12'],
    pruefungen:['Mock Exam 1','Mock Exam 2'] },
  { id:'fluid_fund', name:'Fluid Dynamics Fund.', short:'Fluid Fund.', date:'2026-08-12', time:'08:30–10:00', color:'#3A86D4',
    serien:['Serie 1','Serie 2','Serie 3','Serie 4','Serie 5','Serie 6'],
    pruefungen:['Prüfung 1','Prüfung 2','Prüfung 3','Prüfung 4','Prüfung 5','Midterm 1','Midterm 2'] },
  { id:'thermo3', name:'Thermodynamics III', short:'Thermo III', date:'2026-08-14', time:'13:00–15:00', color:'#E05353',
    serien:['Serie 1','Serie 2','Serie 3','Serie 4','Serie 5','Serie 6','Serie 7','Serie 8','Serie 9','Serie 10','Serie 11','Serie 12','Serie 13'],
    pruefungen:['Prüfung 1','Prüfung 2','Prüfung 3','Prüfung 4','Prüfung 5','Prüfung 6'] },
  { id:'control', name:'Control Systems II', short:'Control Sys.', date:'2026-08-17', time:'15:30–18:00', color:'#D4609A',
    serien:['Serie 1','Serie 2','Serie 3','Serie 4','Serie 5','Serie 6','Serie 7','Serie 8','Serie 9','Serie 10','Serie 11','Serie 12','Serie 13'],
    pruefungen:['Prüfung 1','Prüfung 2','Prüfung 3','Prüfung 4','Prüfung 5','Prüfung 6','Prüfung 7'] },
  { id:'fluid_adv', name:'Fluid Dynamics Adv.', short:'Fluid Adv.', date:'2026-08-19', time:'16:00–18:00', color:'#888899',
    serien:['Serie 1','Serie 2','Serie 3','Serie 4','Serie 5','Serie 6'],
    pruefungen:['Prüfung 1','Prüfung 2','Prüfung 3','Prüfung 4','Prüfung 5','Midterm 1','Midterm 2'] },
];

const SCHEDULE = {
  '2026-06-01':['thermo2','quantum'],
  '2026-06-02':['thermo2','quantum'],'2026-06-03':['thermo2','quantum'],
  '2026-06-04':['thermo2','sml'],'2026-06-05':['thermo2','sml'],
  '2026-06-06':['thermo2','quantum'],'2026-06-07':['thermo2','quantum'],
  '2026-06-09':['thermo2','sml'],'2026-06-10':['thermo2','quantum'],
  '2026-06-11':['thermo2','sml'],'2026-06-12':['thermo2','quantum'],
  '2026-06-13':['thermo2','sml'],'2026-06-14':['thermo2','sml'],
  '2026-06-16':['quantum','sml'],'2026-06-17':['quantum','sml'],
  '2026-06-18':['quantum','sml'],'2026-06-19':['quantum','sml'],
  '2026-06-25':['werkstoffe','sml'],'2026-06-26':['werkstoffe','sml'],
  '2026-06-27':['werkstoffe','sml'],'2026-06-28':['werkstoffe','sml'],
  '2026-06-30':['werkstoffe','sml'],
  '2026-07-01':['werkstoffe','quantum'],'2026-07-02':['werkstoffe','quantum'],
  '2026-07-03':['werkstoffe','quantum'],'2026-07-04':['werkstoffe','thermo3'],
  '2026-07-05':['werkstoffe','thermo3'],'2026-07-06':['werkstoffe','thermo3'],
  '2026-07-07':['werkstoffe','thermo3'],'2026-07-08':['werkstoffe','thermo3'],
  '2026-07-09':['fluid_fund','thermo3'],'2026-07-10':['fluid_fund','thermo3'],
  '2026-07-11':['fluid_fund','thermo3'],'2026-07-12':['fluid_fund','thermo3'],
  '2026-07-13':['fluid_fund','thermo3'],'2026-07-14':['fluid_fund','thermo3'],
  '2026-07-15':['fluid_fund','thermo3'],'2026-07-16':['fluid_adv','thermo3'],
  '2026-07-17':['fluid_adv','thermo3'],'2026-07-18':['fluid_adv','thermo3'],
  '2026-07-19':['fluid_adv','control'],'2026-07-20':['fluid_adv','control'],
  '2026-07-21':['fluid_adv','control'],'2026-07-22':['fluid_adv','control'],
  '2026-07-23':['control','control'],'2026-07-24':['control','control'],
  '2026-07-25':['control','control'],'2026-07-26':['control','control'],
  '2026-07-27':['control','control'],'2026-07-28':['control','control'],
  '2026-07-29':['thermo2','thermo2'],'2026-07-30':['thermo2','thermo2'],
  '2026-07-31':['quantum','quantum'],
  '2026-08-01':['thermo2','quantum'],'2026-08-02':['quantum','quantum'],
  '2026-08-04':['sml','sml'],'2026-08-06':['sml','sml'],
  '2026-08-08':['werkstoffe','werkstoffe'],'2026-08-09':['werkstoffe','fluid_fund'],
  '2026-08-11':['fluid_fund','fluid_fund'],'2026-08-13':['fluid_fund','fluid_fund'],
  '2026-08-15':['thermo3','thermo3'],'2026-08-16':['thermo3','control'],
  '2026-08-18':['control','control'],'2026-08-20':['fluid_adv','fluid_adv'],
};

const OFF = new Set(['2026-06-08','2026-06-20','2026-06-21','2026-06-22','2026-06-23','2026-06-24','2026-06-29',
  '2026-08-03','2026-08-05','2026-08-07','2026-08-10','2026-08-12','2026-08-14','2026-08-17','2026-08-19']);

const PRUEF_DATES = new Set(FAECHER.map(f=>f.date));

function toKey(d){ return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function getFach(id){ return FAECHER.find(f=>f.id===id); }

function loadChecks(){ try{ return JSON.parse(localStorage.getItem('lernplan_checks_2026')||'{}'); }catch(e){ return {}; } }
function saveChecks(c){ localStorage.setItem('lernplan_checks_2026', JSON.stringify(c)); }
let checks = loadChecks();

function checkSVG(color){
  return `<svg width="10" height="10" viewBox="0 0 10 10" fill="none"><polyline points="1.5,5 4,7.5 8.5,2.5" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
}

// TODAY
function renderToday(){
  const now = new Date();
  const key = toKey(now);
  const DAYS = ['Sonntag','Montag','Dienstag','Mittwoch','Donnerstag','Freitag','Samstag'];
  const MONTHS = ['Januar','Februar','März','April','Mai','Juni','Juli','August','September','Oktober','November','Dezember'];
  const dateLabel = DAYS[now.getDay()] + ', ' + now.getDate() + '. ' + MONTHS[now.getMonth()] + ' ' + now.getFullYear();

  const isWeekend = now.getDay()===0||now.getDay()===6;
  const isOff = OFF.has(key) || isWeekend;
  const sched = SCHEDULE[key];

  let inner = `<div class="today-date">${dateLabel}</div>`;

  if(!sched || isOff){
    inner += `<p class="today-free">Heute ist frei — erhol dich gut! 🌿</p>`;
  } else {
    const slots = [
      {icon:'🌅', time:'08:00 – 12:00', label:'Morgenblock'},
      {icon:'☀️', time:'13:30 – 17:30', label:'Nachmittagsblock'},
    ];
    sched.forEach((fId, i) => {
      const f = getFach(fId);
      if(!f) return;
      const ck = checks['today_'+key+'_'+i]||false;
      const isSameAlt = i===1 && sched[0]===fId;
      const blockName = isSameAlt ? f.short + ' — Altprüfung' : f.short;
      inner += `<div class="block-item" onclick="toggleToday('${key}',${i})">
        <div class="block-check ${ck?'done':''}" style="${ck?'background:'+f.color:''}">
          ${ck?checkSVG(f.color):''}
        </div>
        <span class="block-time">${slots[i].icon} ${slots[i].time}</span>
        <span class="block-name ${ck?'done':''}">${blockName}</span>
        <span class="block-tag" style="background:${f.color}22; color:${f.color};">${slots[i].label}</span>
      </div>`;
    });
  }
  document.getElementById('today-card').innerHTML = inner;
}

function toggleToday(key, i){
  const k = 'today_'+key+'_'+i;
  checks[k] = !checks[k];
  saveChecks(checks);
  renderToday();
}

// CALENDAR
let curMonth = Math.max(5, new Date().getMonth());
let curYear = 2026;
const MONTH_NAMES = ['Januar','Februar','März','April','Mai','Juni','Juli','August','September','Oktober','November','Dezember'];
const DOW = ['Mo','Di','Mi','Do','Fr','Sa','So'];

function renderCal(){
  document.getElementById('cal-title').textContent = MONTH_NAMES[curMonth] + ' ' + curYear;
  const dowRow = document.getElementById('cal-dow-row');
  dowRow.innerHTML = DOW.map(d=>`<div class="cal-dow">${d}</div>`).join('');

  const body = document.getElementById('cal-body');
  body.innerHTML = '';
  const todayKey = toKey(new Date());
  const firstDay = new Date(curYear, curMonth, 1);
  let dow = firstDay.getDay(); if(dow===0) dow=7;
  const daysInMonth = new Date(curYear, curMonth+1, 0).getDate();
  const weeks = Math.ceil((dow-1+daysInMonth)/7);

  for(let w=0; w<weeks; w++){
    const row = document.createElement('div');
    row.className = 'cal-grid';
    row.style.gap = '3px';
    row.style.marginBottom = '3px';
    for(let d=1; d<=7; d++){
      const dayNum = w*7+d-(dow-1);
      const cell = document.createElement('div');
      if(dayNum<1||dayNum>daysInMonth){ cell.className='cal-day empty'; row.appendChild(cell); continue; }
      const dateStr = curYear+'-'+String(curMonth+1).padStart(2,'0')+'-'+String(dayNum).padStart(2,'0');
      const isToday = dateStr===todayKey;
      const isWeekend = d>=6;
      const isPruef = PRUEF_DATES.has(dateStr);
      const isOff = OFF.has(dateStr);
      let cls = 'cal-day';
      if(isToday) cls+=' today';
      else if(isPruef) cls+=' pruefung';
      else if(isOff||isWeekend) cls+=' weekend';
      cell.className = cls;
      cell.innerHTML = `<span class="cal-num">${dayNum}</span>`;
      const sched = SCHEDULE[dateStr];
      if(sched && !isOff){
        const f0 = getFach(sched[0]);
        const f1 = getFach(sched[1]);
        if(f0) cell.innerHTML += `<div class="cal-block" style="background:${f0.color}22;color:${f0.color};">${f0.short}</div>`;
        if(f1 && f1.id!==f0.id) cell.innerHTML += `<div class="cal-block" style="background:${f1.color}22;color:${f1.color};">${f1.short}</div>`;
        else if(f1 && f1.id===f0.id) cell.innerHTML += `<div class="cal-block" style="background:${f1.color}22;color:${f1.color};">Altprüfung</div>`;
      }
      if(isPruef){
        const pf = FAECHER.find(f=>f.date===dateStr);
        cell.innerHTML += `<div class="cal-pruef-label">Prüfung ${pf?pf.short:''}</div>`;
      }
      if(isOff && !isPruef && !isWeekend) cell.innerHTML += `<div style="font-size:9px;color:var(--faint);padding:2px 4px;">Frei</div>`;
      row.appendChild(cell);
    }
    body.appendChild(row);
  }
}

document.getElementById('prev-btn').onclick = () => { if(curMonth>5){curMonth--;renderCal();} };
document.getElementById('next-btn').onclick = () => { if(curMonth<7){curMonth++;renderCal();} };

// LEGEND
function renderLegend(){
  document.getElementById('legend').innerHTML = FAECHER.map(f=>
    `<div class="legend-item"><div class="legend-dot" style="background:${f.color}"></div>${f.short}</div>`
  ).join('');
}

// TODOS
function renderTodos(){
  const container = document.getElementById('todos-card');
  container.innerHTML = FAECHER.map(f => {
    const ds = f.serien.filter((_,i)=>checks[f.id+'_s_'+i]).length;
    const dp = f.pruefungen.filter((_,i)=>checks[f.id+'_p_'+i]).length;
    const total = f.serien.length + f.pruefungen.length;
    const done = ds+dp;
    const pct = total>0 ? Math.round(done/total*100) : 0;
    const dateStr = f.date.slice(5).replace('-','.');

    const serieRows = f.serien.map((s,i)=>{
      const ck = checks[f.id+'_s_'+i]||false;
      return `<div class="todo-row" onclick="toggleTodo('${f.id}','s',${i})">
        <div class="t-check ${ck?'done':''}" style="${ck?'background:'+f.color+';border-color:'+f.color:''}">${ck?checkSVG():''}</div>
        <span class="t-label ${ck?'done':''}">${s}</span>
      </div>`;
    }).join('');

    const pruefRows = f.pruefungen.map((p,i)=>{
      const ck = checks[f.id+'_p_'+i]||false;
      return `<div class="todo-row" onclick="toggleTodo('${f.id}','p',${i})">
        <div class="t-check ${ck?'done':''}" style="${ck?'background:'+f.color+';border-color:'+f.color:''}">${ck?checkSVG():''}</div>
        <span class="t-label ${ck?'done':''}">${p}</span>
        <span class="t-badge" style="background:${f.color}22;color:${f.color};">Prüfung</span>
      </div>`;
    }).join('');

    return `<div class="fach-section">
      <div class="fach-header" onclick="toggleFach('${f.id}')">
        <div class="fach-dot" style="background:${f.color}"></div>
        <span class="fach-title">${f.name}</span>
        <span class="fach-pruef-date">${dateStr}</span>
        <span class="fach-progress">${done}/${total}</span>
        <svg class="fach-chevron" id="chev-${f.id}" width="12" height="12" viewBox="0 0 12 12" fill="none">
          <polyline points="2,4 6,8 10,4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </div>
      <div class="progress-bar-wrap" style="margin: 0 1.25rem 0;">
        <div class="progress-bar" style="width:${pct}%;background:${f.color};"></div>
      </div>
      <div class="fach-body" id="body-${f.id}">
        <div class="sub-label">Serien</div>
        ${serieRows}
        <div class="sub-label">Altprüfungen</div>
        ${pruefRows}
      </div>
    </div>`;
  }).join('');
}

function toggleFach(id){
  document.getElementById('body-'+id).classList.toggle('open');
  document.getElementById('chev-'+id).classList.toggle('open');
}

function toggleTodo(fachId, type, i){
  const k = fachId+'_'+type+'_'+i;
  checks[k] = !checks[k];
  saveChecks(checks);
  renderTodos();
}

renderToday();
renderCal();
renderLegend();
renderTodos();
</script>
</body>
</html>
